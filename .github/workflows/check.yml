
name: Repo Health Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  health-check:
    name: Run Health Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Make check.sh executable
        run: chmod +x ./check.sh

      - name: Run repo health checks
        run: ./check.sh
