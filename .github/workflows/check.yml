name: Repo Health Check

on:
  push:
    branches: ["**"]      # Runs on every push to any branch
  pull_request:
    branches: ["**"]      # Also runs on all pull requests

jobs:
  health-check:
    name: Run Health Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history needed for commit message checks

      - name: Make check.sh executable
        run: chmod +x ./check.sh

      - name: Run repo health checks
        run: ./check.sh